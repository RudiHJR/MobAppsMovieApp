<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>G00473368 - Movie Details</ion-title>
    <ion-button (click)="openFavourites()">My Favourites</ion-button>
    <ion-button (click)="openHome()">Return Home</ion-button>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <img *ngIf="movie?.poster_path" src="{{'https://image.tmdb.org/t/p/w500' + movie?.poster_path}}" />
  <ion-title>{{movie?.original_title}}: Cast and Crew</ion-title>

  <ion-card *ngFor="let member of castAndCrew?.cast">
  <img *ngIf= "member.profile_path" src="{{'https://image.tmdb.org/t/p/w200' + member.profile_path}}" />
<ion-card-header>
    <ion-card-title>Actor: {{member.name}}</ion-card-title>
  <ion-card-subtitle>Character: {{member.character}}</ion-card-subtitle>
</ion-card-header>
  <ion-button (click)="openCastDetails(member)">More from this Actor</ion-button>
</ion-card>
</ion-content>
